<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NEXT Ventures OT Payment Calculator</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;700;800;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-red: #e63946;
            --dark-black: #121212;
            --pure-white: #ffffff;
            --bg-gray: #f8f9fa;
        }

        body {
            font-family: 'Poppins', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--dark-black);
            color: var(--pure-white);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }

        .calculator-card {
            background-color: var(--pure-white);
            color: var(--dark-black);
            padding: 35px;
            border-radius: 16px;
            box-shadow: 0 15px 40px rgba(230, 57, 70, 0.4);
            width: 100%;
            max-width: 450px;
            border-top: 10px solid var(--primary-red);
        }

        .logo-area {
            text-align: center;
            margin-bottom: 25px;
        }

        h2 {
            margin: 0;
            font-weight: 900;
            text-transform: uppercase;
            font-size: 1.4rem;
            letter-spacing: -0.5px;
            line-height: 1.2;
        }

        h2 span {
            color: var(--primary-red);
        }

        .input-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-bottom: 15px;
        }

        .input-group {
            margin-bottom: 18px;
        }

        label {
            display: block;
            margin-bottom: 6px;
            font-weight: 700;
            font-size: 0.85rem;
            color: #444;
            text-transform: uppercase;
        }

        input {
            width: 100%;
            padding: 14px;
            border: 2px solid #eee;
            border-radius: 8px;
            box-sizing: border-box;
            font-size: 1rem;
            transition: all 0.3s ease;
        }

        input:focus {
            border-color: var(--primary-red);
            outline: none;
            background-color: #fff8f8;
        }

        .ot-section {
            background-color: #fff5f5;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 15px;
            border: 1px dashed var(--primary-red);
        }

        button {
            width: 100%;
            padding: 16px;
            background-color: var(--dark-black);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: 800;
            cursor: pointer;
            margin-top: 10px;
            transition: 0.3s;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        button:hover {
            background-color: var(--primary-red);
            transform: translateY(-2px);
        }

        .result-area {
            margin-top: 25px;
            padding: 20px;
            background-color: var(--bg-gray);
            border-radius: 12px;
            display: none;
        }

        .result-line {
            display: flex;
            justify-content: space-between;
            margin-bottom: 10px;
            font-size: 0.9rem;
            color: #555;
            border-bottom: 1px solid #eee;
            padding-bottom: 5px;
        }

        .grand-total {
            font-size: 1.6rem;
            font-weight: 900;
            color: var(--primary-red);
            text-align: center;
            margin-top: 15px;
            display: block;
        }

        .footer {
            text-align: center;
            font-size: 0.75rem;
            color: #888;
            margin-top: 25px;
            line-height: 1.4;
        }
    </style>
</head>

<body>

    <div class="calculator-card">
        <div class="logo-area">
            <h2>NEXT <span>Ventures</span><br>OT Payment Calculator</h2>
        </div>

        <div class="input-row">
            <div class="input-group">
                <label>Gross Salary</label>
                <input type="number" id="grossSalary" placeholder="Amount">
            </div>
            <div class="input-group">
                <label>Daily Hours</label>
                <input type="number" id="dailyHours" placeholder="e.g. 9">
            </div>
        </div>

        <div class="ot-section">
            <div class="input-group">
                <label>2.5x OT Hours</label>
                <input type="number" id="otHours25" placeholder="Total hours">
            </div>

            <div class="input-group" style="margin-bottom: 0;">
                <label>4.0x OT Hours</label>
                <input type="number" id="otHours4" placeholder="Total hours">
            </div>
        </div>

        <button onclick="calculateOT()">Calculate Final Payment</button>

        <div id="result" class="result-area">
            <div class="result-line">
                <span>Monthly Working Hours:</span>
                <strong id="resMonthlyHrs">0</strong>
            </div>
            <div class="result-line">
                <span>2.5x OT Payment:</span>
                <strong id="res25Part">0</strong>
            </div>
            <div class="result-line">
                <span>4.0x OT Payment:</span>
                <strong id="res4Part">0</strong>
            </div>
            <div class="grand-total" id="grandTotalText">
                0.00
            </div>
        </div>

        <div class="footer">
            <strong>Formula:</strong> (Salary/2) × (OT × Multiplier) / (Daily × 22)<br>
            Next Ventures Ltd. Proprietary Tool
        </div>
    </div>

    <script>
        function calculateOT() {
            // Inputs
            const gross = parseFloat(document.getElementById('grossSalary').value) || 0;
            const dailyHrs = parseFloat(document.getElementById('dailyHours').value) || 0;
            const ot25 = parseFloat(document.getElementById('otHours25').value) || 0;
            const ot4 = parseFloat(document.getElementById('otHours4').value) || 0;

            if (gross <= 0 || dailyHrs <= 0) {
                alert("Please enter valid Gross Salary and Daily Working Hours.");
                return;
            }

            // 1. Total Monthly Working Hours
            const totalMonthlyHours = dailyHrs * 22;

            // 2. Calculation Breakdown
            // Part 1: (Gross/2) * (OT * 2.5) / Monthly Hours
            const payment25 = ((gross / 2) * (ot25 * 2.5)) / totalMonthlyHours;

            // Part 2: (Gross/2) * (OT * 4.0) / Monthly Hours
            const payment4 = ((gross / 2) * (ot4 * 4)) / totalMonthlyHours;

            const grandTotal = payment25 + payment4;

            // UI Updates
            document.getElementById('resMonthlyHrs').innerText = totalMonthlyHours + " hrs";
            document.getElementById('res25Part').innerText = payment25.toLocaleString(undefined, { minimumFractionDigits: 2, maximumFractionDigits: 2 });
            document.getElementById('res4Part').innerText = payment4.toLocaleString(undefined, { minimumFractionDigits: 2, maximumFractionDigits: 2 });

            document.getElementById('grandTotalText').innerText = "Total: " + grandTotal.toLocaleString(undefined, { minimumFractionDigits: 2, maximumFractionDigits: 2 });

            document.getElementById('result').style.display = 'block';
        }
    </script>

</body>

</html>
